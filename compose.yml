services:
  db:
    build: ./db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tt_tracker}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/home/postgres/pgdata/data
      - ./db/seed:/seed:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-tt_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    image: golang:1.26-alpine
    working_dir: /migrations
    volumes:
      - ./db/migrations:/migrations:ro
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tt_tracker}?sslmode=disable"
    command: >
      sh -c "go install github.com/pressly/goose/v3/cmd/goose@latest &&
             goose up"
    depends_on:
      db:
        condition: service_healthy

  collector:
    build:
      context: .
      dockerfile: collector/Dockerfile
    environment:
      TYCOON_API_KEY: ${TYCOON_API_KEY}
      TYCOON_SERVERS: ${TYCOON_SERVERS:-2epova:main,njyvop:beta}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-2000}
      FLUSH_INTERVAL_MS: ${FLUSH_INTERVAL_MS:-5000}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-tt_tracker}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      API_PORT: "8080"
      TYCOON_API_KEY: ${TYCOON_API_KEY}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-tt_tracker}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --config /etc/cloudflared/config.yml run ${CF_TUNNEL_ID}
    volumes:
      - ./infra/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ${CF_CREDS_PATH}:/etc/cloudflared/credentials.json:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
