<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TT Tracker</title>
  <link rel="stylesheet" href="/dist/leaflet.css" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #1a1a2e; color: #e0e0e0; font-family: system-ui, sans-serif; }
    #map { width: 100%; height: 100%; }

    #controls {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: rgba(20, 20, 40, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      min-width: 190px;
      backdrop-filter: blur(8px);
    }
    #controls h3 { font-size: 14px; margin-bottom: 8px; color: #a0a0c0; }
    #controls label { display: flex; align-items: center; gap: 6px; margin: 4px 0; cursor: pointer; }
    #controls select, #controls input[type="text"], #controls input[type="number"] {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      color: #e0e0e0;
      padding: 3px 6px;
      font-size: 12px;
      width: 100%;
      margin-top: 2px;
    }
    .search-dropdown { position: relative; width: 100%; margin-top: 2px; }
    .search-dropdown input {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 4px;
      color: #e0e0e0;
      padding: 3px 6px;
      font-size: 12px;
      width: 100%;
    }
    .search-dropdown .dd-list {
      display: none;
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      max-height: 180px;
      overflow-y: auto;
      background: rgba(20, 20, 40, 0.97);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-top: none;
      border-radius: 0 0 4px 4px;
      z-index: 1001;
    }
    .search-dropdown.open .dd-list { display: block; }
    .dd-list .dd-item {
      padding: 4px 6px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
    }
    .dd-list .dd-item:hover { background: rgba(255, 255, 255, 0.1); }
    .dd-list .dd-item .dd-count { color: #707090; font-size: 11px; }
    .dd-list .dd-empty { padding: 4px 6px; font-size: 11px; color: #707090; }
    .section { margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255, 255, 255, 0.08); }
    .section-title { font-size: 11px; text-transform: uppercase; color: #707090; letter-spacing: 0.5px; margin-bottom: 4px; }

    #player-count {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 1000;
      background: rgba(20, 20, 40, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 14px;
      font-weight: 600;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="controls">
    <h3>Controls</h3>

    <div>
      <label><select id="server-select">
        <option value="main">Main</option>
        <option value="beta">Beta</option>
      </select></label>
    </div>

    <div class="section">
      <div class="section-title">Layers</div>
      <label><input type="checkbox" id="toggle-players" checked /> Players</label>
      <label><input type="checkbox" id="toggle-trails" checked /> Trails</label>
      <label><input type="checkbox" id="toggle-heatmap" /> Heatmap</label>
    </div>

    <div class="section">
      <div class="section-title">Heatmap Filters</div>
      <label>Range
        <select id="filter-range">
          <option value="1h">1 hour</option>
          <option value="6h">6 hours</option>
          <option value="24h">24 hours</option>
          <option value="7d">7 days</option>
        </select>
      </label>
      <div>Job
        <div class="search-dropdown" id="dd-job">
          <input type="text" placeholder="search jobs..." />
          <div class="dd-list"></div>
        </div>
      </div>
      <div>Vehicle
        <div class="search-dropdown" id="dd-vehicle">
          <input type="text" placeholder="search vehicles..." />
          <div class="dd-list"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="player-count">Players: <span>0</span></div>

  <script src="/dist/main.js"></script>
</body>
</html>
